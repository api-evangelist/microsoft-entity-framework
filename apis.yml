aid: microsoft-entity-framework
name: Microsoft Entity Framework
description: Microsoft Entity Framework is an object-relational mapping (ORM) framework
  for .NET developers enabling database access using .NET objects. EF Core is the
  modern, cross-platform version supporting SQL Server, PostgreSQL, MySQL, SQLite,
  and Cosmos DB with LINQ queries, change tracking, migrations, and code-first modeling.
