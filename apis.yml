name: Microsoft Entity Framework
description: >-
  Microsoft Entity Framework is an object-relational mapping (ORM) framework for .NET
  developers. It eliminates the need for most data-access code by enabling developers
  to work with databases using .NET objects.
image: https://docs.microsoft.com/en-us/ef/images/ef-logo.png
tags:
  - ORM
  - Database
  - .NET
  - Entity Framework
  - Data Access
